name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: black-carp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /srv/www/black-carp
            export GIT_SSH_COMMAND="ssh -i /home/blackcarp-deploy/.ssh/black_carp_github -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
            git fetch origin main
            git reset --hard origin/main
