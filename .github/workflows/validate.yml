name: Validate

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_FILE: docker-compose.production.example.yml
      COMPOSE_PROJECT_NAME: black-carp-ci
      BLACK_CARP_ENV_FILE: ${{ github.workspace }}/.env.example
      BLACK_CARP_DATA_DIR: ${{ github.workspace }}/.tmp/black-carp-data
      BLACK_CARP_UPLOADS_DIR: ${{ github.workspace }}/.tmp/black-carp-uploads
      BLACK_CARP_RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js
          test -d assets
          test -f crm/index.html
          test -x ops/verify-release-image.sh
          bash -n ops/backup.sh ops/verify-restore.sh ops/verify-release-image.sh
          npm run check
          npm test

      - name: Verify backup and restore
        env:
          NODE_ENV: test
          DB_PATH: ${{ runner.temp }}/black-carp-backup-source.sqlite
          BLACK_CARP_APP_DIR: ${{ github.workspace }}
          BLACK_CARP_BACKUP_DIR: ${{ runner.temp }}/black-carp-backups
          BLACK_CARP_DB_PATH: ${{ runner.temp }}/black-carp-backup-source.sqlite
          BLACK_CARP_UPLOADS_PATH: ${{ runner.temp }}/black-carp-backup-uploads
        run: |
          mkdir -p "$BLACK_CARP_UPLOADS_PATH/booking"
          node -e "const {db}=require('./server'); db.close()"
          BLACK_CARP_NODE_BIN="$(command -v node)" ./ops/backup.sh
          test "$(find "$BLACK_CARP_BACKUP_DIR" -maxdepth 1 -name '*.sha256' -type f | wc -l)" -eq 1

      - name: Build and smoke-test production image
        run: |
          mkdir -p "$BLACK_CARP_DATA_DIR" "$BLACK_CARP_UPLOADS_DIR"
          docker compose config --quiet
          mkdir -p "$RUNNER_TEMP/black-carp-candidate-data" "$RUNNER_TEMP/black-carp-candidate-uploads"
          BLACK_CARP_CANDIDATE_BIND_PORT=3002 BLACK_CARP_CANDIDATE_DATA_DIR="$RUNNER_TEMP/black-carp-candidate-data" BLACK_CARP_CANDIDATE_UPLOADS_DIR="$RUNNER_TEMP/black-carp-candidate-uploads" BLACK_CARP_CANDIDATE_ENV_FILE="$BLACK_CARP_ENV_FILE" BLACK_CARP_CANDIDATE_DOCKER_NETWORK=black-carp-ci-candidate docker compose -p black-carp-ci-candidate -f docker-compose.production.candidate.example.yml config --quiet
          docker compose build --pull
          docker compose up --detach
          curl --fail --show-error --silent --retry 12 --retry-delay 2 --retry-all-errors http://127.0.0.1:3001/health > /dev/null
          curl --fail --show-error --silent http://127.0.0.1:3001/ > /dev/null
          curl --fail --show-error --silent http://127.0.0.1:3001/crm/ > /dev/null
          test "$(docker compose exec -T black-carp id -u | tr -d '\r')" = "1000"
          test "$(stat -c '%u' "$BLACK_CARP_DATA_DIR")" = "1000"
          test "$(docker image inspect "black-carp:$BLACK_CARP_RELEASE_SHA" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" = "$BLACK_CARP_RELEASE_SHA"
          docker compose exec -T black-carp test -s /app/data/black-carp.sqlite
          docker compose restart black-carp
          curl --fail --show-error --silent --retry 12 --retry-delay 2 --retry-all-errors http://127.0.0.1:3001/health > /dev/null

      - name: Smoke-test isolated candidate
        env:
          BLACK_CARP_CANDIDATE_BIND_PORT: 3002
          BLACK_CARP_CANDIDATE_DATA_DIR: ${{ runner.temp }}/black-carp-candidate-data
          BLACK_CARP_CANDIDATE_UPLOADS_DIR: ${{ runner.temp }}/black-carp-candidate-uploads
          BLACK_CARP_CANDIDATE_ENV_FILE: ${{ github.workspace }}/.env.example
          BLACK_CARP_CANDIDATE_DOCKER_NETWORK: black-carp-ci-candidate
        run: |
          docker compose -p black-carp-ci-candidate -f docker-compose.production.candidate.example.yml up --detach
          curl --fail --show-error --silent --retry 12 --retry-delay 2 --retry-all-errors http://127.0.0.1:3002/health > "$RUNNER_TEMP/black-carp-candidate-health.json"
          HEALTH_FILE="$RUNNER_TEMP/black-carp-candidate-health.json" node -e 'const fs=require("fs"); const body=JSON.parse(fs.readFileSync(process.env.HEALTH_FILE,"utf8")); if (!body.ok || body.release !== process.env.BLACK_CARP_RELEASE_SHA) process.exit(1)'
          test "$(docker compose -p black-carp-ci-candidate -f docker-compose.production.candidate.example.yml exec -T black-carp-candidate id -u | tr -d '\r')" = "1000"
          curl --fail --show-error --silent http://127.0.0.1:3002/health > /dev/null

      - name: Stop candidate smoke
        if: always()
        env:
          BLACK_CARP_CANDIDATE_BIND_PORT: 3002
          BLACK_CARP_CANDIDATE_DATA_DIR: ${{ runner.temp }}/black-carp-candidate-data
          BLACK_CARP_CANDIDATE_UPLOADS_DIR: ${{ runner.temp }}/black-carp-candidate-uploads
          BLACK_CARP_CANDIDATE_ENV_FILE: ${{ github.workspace }}/.env.example
          BLACK_CARP_CANDIDATE_DOCKER_NETWORK: black-carp-ci-candidate
        run: docker compose -p black-carp-ci-candidate -f docker-compose.production.candidate.example.yml down --remove-orphans

      - name: Stop production smoke
        if: always()
        run: docker compose down --remove-orphans


  publish:
    needs: application
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      BLACK_CARP_RELEASE_SHA: ${{ github.sha }}
      IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Publish immutable release image
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          image="${IMAGE_REPOSITORY,,}"
          printf '%s\n' "$GITHUB_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker buildx build \
            --pull \
            --file Dockerfile \
            --build-arg VCS_REF="$BLACK_CARP_RELEASE_SHA" \
            --tag "$image:$BLACK_CARP_RELEASE_SHA" \
            --push \
            --provenance=false \
            --sbom=false \
            --metadata-file "$RUNNER_TEMP/black-carp-image-metadata.json" \
            .
          digest="$(node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(m["containerimage.digest"] || "")' "$RUNNER_TEMP/black-carp-image-metadata.json")"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          printf '{"release_sha":"%s","image":"%s","digest":"%s","image_ref":"%s@%s"}\n' "$BLACK_CARP_RELEASE_SHA" "$image" "$digest" "$image" "$digest" > "$RUNNER_TEMP/black-carp-release-manifest.json"

      - name: Upload immutable release manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: black-carp-release-${{ github.sha }}
          path: ${{ runner.temp }}/black-carp-release-manifest.json
          if-no-files-found: error
          retention-days: 14
