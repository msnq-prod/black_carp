<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="theme-color" content="#11100e">
    <title>Black Carp Admin</title>
    <link rel="stylesheet" href="/crm/styles.css?v=crm-20260716b">
  </head>
  <body>
    <main class="app-shell" id="app">
      <section class="auth-state" id="authState" hidden>
        <p class="eyebrow">ДОСТУП ОГРАНИЧЕН</p>
        <h1>Откройте CRM<br>из Telegram.</h1>
        <p>Админка доступна мастеру из защищённой кнопки бота.</p>
      </section>

      <section class="workspace" id="workspace" hidden>
        <aside class="request-list app-screen" aria-label="Список заявок">
          <header class="appbar">
            <a class="appbar__brand" href="/" aria-label="Black Carp">BC</a>
            <strong class="appbar__title">Заявки</strong>
            <button class="appbar__action" id="refreshButton" type="button">Обновить</button>
          </header>
          <div class="app-content">
            <div class="list-heading"><p class="eyebrow">ВХОДЯЩИЕ</p><h1>Заявки</h1></div>
            <div class="counters" id="counters"></div>
            <label class="search"><span aria-hidden="true">⌕</span><input id="searchInput" type="search" aria-label="Поиск заявок" placeholder="Имя, контакт или номер"></label>
            <div class="filters" id="filters" role="group" aria-label="Фильтр статусов"></div>
            <div class="request-rows" id="requestRows" role="region" aria-label="Заявки" aria-live="polite"></div>
            <button class="load-more" id="loadMore" type="button" hidden>Показать ещё</button>
          </div>
        </aside>

        <section class="request-detail app-screen" id="requestDetail" aria-label="Карточка заявки" tabindex="-1">
          <div class="empty-detail"><p class="eyebrow">BLACK CARP CRM</p><h2>Выберите<br>заявку.</h2></div>
        </section>

        <section class="portfolio-section app-screen" id="portfolioSection" aria-label="Портфолио" hidden>
          <header class="appbar">
            <span class="appbar__brand">BC</span>
            <strong class="appbar__title">Портфолио</strong>
            <button class="appbar__action" id="newPortfolioButton" type="button">+ Работа</button>
          </header>
          <div class="app-content">
            <div class="portfolio-summary" id="portfolioSummary"></div>
            <label class="search"><span aria-hidden="true">⌕</span><input id="portfolioSearch" type="search" aria-label="Поиск работ" placeholder="Название или зона"></label>
            <div class="filters" id="portfolioFilters" role="group" aria-label="Фильтр работ">
              <button class="filter" type="button" data-portfolio-status="" aria-pressed="true">Все</button>
              <button class="filter" type="button" data-portfolio-status="published" aria-pressed="false">Опубликовано</button>
              <button class="filter" type="button" data-portfolio-status="draft" aria-pressed="false">Черновики</button>
              <button class="filter" type="button" data-portfolio-status="archived" aria-pressed="false">Архив</button>
            </div>
            <div class="portfolio-grid" id="portfolioGrid"></div>
            <div class="state-error" id="portfolioError" hidden role="alert"></div>
          </div>
        </section>

        <section class="portfolio-editor app-screen" id="portfolioEditor" aria-label="Редактор работы" hidden>
          <header class="appbar">
            <button class="back-button" id="portfolioBack" type="button" aria-label="Назад">‹</button>
            <strong class="appbar__title">Редактор</strong>
            <button class="appbar__action appbar__danger" id="archivePortfolioButton" type="button">В архив</button>
          </header>
          <form class="portfolio-form app-content" id="portfolioForm">
            <div class="media-preview" id="portfolioPreview"><span>Добавьте изображение</span></div>
            <label class="upload-button">Выбрать изображение<input id="portfolioImage" type="file" accept="image/jpeg,image/png,image/webp" hidden></label>
            <label class="field">Название<input name="title" maxlength="100" required></label>
            <label class="field">Описание<textarea name="caption" maxlength="300" rows="3"></textarea></label>
            <label class="field">Alt-текст<input name="altText" maxlength="200" required></label>
            <div class="field-row">
              <label class="field">Зона<input name="bodyZone" maxlength="80"></label>
              <label class="field">Стиль<input name="style" maxlength="80"></label>
            </div>
            <label class="field">Год<input name="year" type="number" min="1900" max="2100"></label>
            <p class="form-feedback" id="portfolioFeedback" role="status" aria-live="polite"></p>
            <div class="editor-actions">
              <button class="button" type="submit">Сохранить</button>
              <button class="button button--primary" id="publishPortfolioButton" type="button">Опубликовать</button>
            </div>
          </form>
        </section>

        <nav class="bottom-nav" id="bottomNav" aria-label="Разделы админки">
          <button class="nav-button is-active" type="button" data-section="requests">☷ <span>Заявки</span></button>
          <button class="nav-button" type="button" data-section="portfolio">▦ <span>Портфолио</span></button>
        </nav>
        <span class="sync-status" id="syncStatus" role="status" aria-live="polite"></span>
      </section>
    </main>

    <dialog class="confirm-dialog" id="statusConfirm" aria-labelledby="statusConfirmTitle" aria-describedby="statusConfirmText">
      <form method="dialog">
        <p class="eyebrow">ПОДТВЕРЖДЕНИЕ</p>
        <h2 id="statusConfirmTitle">Изменить статус?</h2>
        <p id="statusConfirmText">Это действие нельзя отменить.</p>
        <div class="confirm-dialog__actions"><button value="cancel">Отмена</button><button class="confirm-dialog__primary" value="confirm">Подтвердить</button></div>
      </form>
    </dialog>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/crm/app.js?v=crm-20260716b"></script>
  </body>
</html>
