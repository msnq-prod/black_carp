# Smoke-only candidate stack. It intentionally uses distinct service names,
# loopback port, network and storage so it cannot join the live Caddy upstream.
services:
  black-carp-candidate-init:
    image: ${BLACK_CARP_IMAGE:-black-carp:${BLACK_CARP_RELEASE_SHA:?candidate release SHA is required}}
    user: "0:0"
    restart: "no"
    environment:
      APP_UID: ${BLACK_CARP_UID:-1000}
      APP_GID: ${BLACK_CARP_GID:-1000}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        chown -R "$$APP_UID:$$APP_GID" /app/data /app/uploads
        find /app/data /app/uploads -type d -exec chmod 700 {} +
        find /app/data /app/uploads -type f -exec chmod 600 {} +
    volumes:
      - ${BLACK_CARP_CANDIDATE_DATA_DIR:?candidate data directory is required}:/app/data
      - ${BLACK_CARP_CANDIDATE_UPLOADS_DIR:?candidate uploads directory is required}:/app/uploads

  black-carp-candidate:
    image: ${BLACK_CARP_IMAGE:-black-carp:${BLACK_CARP_RELEASE_SHA:?candidate release SHA is required}}
    depends_on:
      black-carp-candidate-init:
        condition: service_completed_successfully
    restart: unless-stopped
    user: "${BLACK_CARP_UID:-1000}:${BLACK_CARP_GID:-1000}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    env_file: ${BLACK_CARP_CANDIDATE_ENV_FILE:?candidate env file is required}
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      RELEASE_SHA: ${BLACK_CARP_RELEASE_SHA:?candidate release SHA is required}
      BOT_TOKEN: candidate-disabled
      BOT_USERNAME: blackcarp_candidate
      WEBHOOK_SECRET: candidate-disabled
      DEPLOY_PROBE_TOKEN: candidate-disabled
      MASTER_CHAT_IDS: "0"
      MASTER_TELEGRAM_IDS: "0"
      SITE_URL: https://candidate.invalid
      CRM_WEBAPP_URL: https://candidate.invalid/crm
      ALLOWED_ORIGINS: https://candidate.invalid
      TELEGRAM_API_BASE: http://127.0.0.1:9
      DISABLE_OUTBOX_WORKER: "1"
      DISABLE_TELEGRAM_DELIVERY: "1"
    ports:
      - "127.0.0.1:${BLACK_CARP_CANDIDATE_BIND_PORT:?candidate bind port is required}:3001"
    volumes:
      - ${BLACK_CARP_CANDIDATE_DATA_DIR:?candidate data directory is required}:/app/data
      - ${BLACK_CARP_CANDIDATE_UPLOADS_DIR:?candidate uploads directory is required}:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777

networks:
  default:
    name: ${BLACK_CARP_CANDIDATE_DOCKER_NETWORK:?candidate network is required}
