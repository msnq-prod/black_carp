services:
  black-carp-init:
    image: black-carp:${BLACK_CARP_RELEASE_SHA:-local}
    build:
      context: .
      args:
        VCS_REF: ${BLACK_CARP_RELEASE_SHA:-local}
    user: "0:0"
    restart: "no"
    environment:
      APP_UID: ${BLACK_CARP_UID:-1000}
      APP_GID: ${BLACK_CARP_GID:-1000}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        chown -R "$$APP_UID:$$APP_GID" /app/data /app/uploads
        find /app/data /app/uploads -type d -exec chmod 700 {} +
        find /app/data /app/uploads -type f -exec chmod 600 {} +
    volumes:
      - ${BLACK_CARP_DATA_DIR:-./data}:/app/data
      - ${BLACK_CARP_UPLOADS_DIR:-./uploads}:/app/uploads

  black-carp:
    image: black-carp:${BLACK_CARP_RELEASE_SHA:-local}
    build:
      context: .
      args:
        VCS_REF: ${BLACK_CARP_RELEASE_SHA:-local}
    depends_on:
      black-carp-init:
        condition: service_completed_successfully
    restart: unless-stopped
    user: "${BLACK_CARP_UID:-1000}:${BLACK_CARP_GID:-1000}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    env_file: ${BLACK_CARP_ENV_FILE:-.env}
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      RELEASE_SHA: ${BLACK_CARP_RELEASE_SHA:-local}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ${BLACK_CARP_DATA_DIR:-./data}:/app/data
      - ${BLACK_CARP_UPLOADS_DIR:-./uploads}:/app/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777

networks:
  default:
    name: ${BLACK_CARP_DOCKER_NETWORK:-black-carp}
    external: ${BLACK_CARP_DOCKER_NETWORK_EXTERNAL:-false}
